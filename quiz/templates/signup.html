{% extends "base.html" %}

{% block title %}Registrierung - Lernplattform{% endblock %}

{% block content %}
<div class="layout-container page-pad max-w-xl">
	<h1 class="page-title">Registrierung</h1>

	<div class="surface-card p-6">
		{% if messages %}
			<div class="mb-4 rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-amber-800">
				{% for message in messages %}
					<p>{{ message }}</p>
				{% endfor %}
			</div>
		{% endif %}

		<form method="post" class="auth-form space-y-4">
			{% csrf_token %}
			{{ form.non_field_errors }}
			{{ form.as_p }}
			<button type="submit" class="btn-primary">
				Registrieren
			</button>
		</form>

		<a href="/accounts/login/" class="inline-block mt-4 text-link">Zum Login</a>
	</div>
</div>
{% endblock %}
