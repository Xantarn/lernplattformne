{% extends "base.html" %}

{% block title %}Karteikarte löschen{% endblock %}

{% block content %}
<div class="layout-container page-pad">
    <div class="max-w-md mx-auto">
        <div class="surface-card p-8">
            <h1 class="text-2xl font-bold text-center mb-6">Karteikarte löschen?</h1>
            
            <p class="text-center muted-text mb-6">Bist du sicher, dass du diese Karteikarte löschen möchtest?</p>
            
            <div class="bg-gray-50 p-4 rounded mb-6 border-l-4 border-orange-500">
                <p class="font-semibold">{{ flashcard.front }}</p>
            </div>

            <form method="POST" class="flex gap-3">
                {% csrf_token %}
                <a href="{% url 'flashcards' flashcard.course.id %}" class="btn-secondary flex-1 text-center">← Abbrechen</a>
                <button type="submit" class="btn-danger flex-1">🗑️ Löschen</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
